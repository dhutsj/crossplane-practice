apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: dynamo-with-bucket
spec:
  compositeTypeRef:
    apiVersion: database.example.com/v1alpha1
    kind: NoSQL
  mode: Pipeline
  pipeline:
  - step: patch-and-transform
    functionRef:
      name: function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
        - name: s3Bucket
          base:
            apiVersion: s3.aws.m.upbound.io/v1beta1
            kind: Bucket
            metadata:
              name: tsj-test-crossplane-quickstart-bucket
            spec:
              forProvider:
                region: us-west-2
                tags: {"owner": "tsj", "created_by": "crossplane"}
          patches:
            - type: FromCompositeFieldPath
              fromFieldPath: "spec.location"
              toFieldPath: "spec.forProvider.region"
              transforms:
                - type: map
                  map: 
                    EU: "eu-north-1"
                    US: "us-west-2"
            - type: FromCompositeFieldPath
              fromFieldPath: "spec.s3_bucket_name"
              toFieldPath: "metadata.name"
        - name: dynamoDB
          base:
            apiVersion: dynamodb.aws.m.upbound.io/v1beta1
            kind: Table
            metadata:
              name: crossplane-quickstart-database
            spec:
              forProvider:
                region: "us-west-2"
                writeCapacity: 1
                readCapacity: 1
                attribute:
                  - name: S3ID
                    type: S
                hashKey: S3ID
          patches:
            - type: FromCompositeFieldPath
              fromFieldPath: "spec.location"
              toFieldPath: "spec.forProvider.region"
              transforms:
                - type: map
                  map: 
                    EU: "eu-north-1"
                    US: "us-west-2"
            - type: FromCompositeFieldPath
              fromFieldPath: "spec.dynamodb_table_name"
              toFieldPath: "metadata.name"
